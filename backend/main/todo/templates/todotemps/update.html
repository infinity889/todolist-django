{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменить задачу</title>
    <link rel="stylesheet" href="{% static 'todo/css/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Изменить задачу</h1>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit">Сохранить</button>
                <a href="{% url 'home' %}" class="btn btn-cancel">Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
